<!DOCTYPE html>
<html>
<head>
    <title>Letter to My Future Self</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #ffd6e0, #ffeef5);
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #d63384;
            margin-top: 40px;
        }

        .container {
            background: white;
            width: 50%;
            margin: 30px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ffb6c1;
        }

        button {
            background: #ff4d88;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #e6005c;
            transform: scale(1.05);
        }

        .output {
            margin: 30px auto;
            width: 50%;
            background: #fff5f8;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.08);
            font-family: 'Playfair Display', serif;
            color: #5c2a3c;
            line-height: 1.6;
        }

        /* 💕 Floating hearts */
        .heart {
            position: fixed;
            color: pink;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .note {
            color: #d63384;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>💌 Write a Letter to Your Future Self</h1>

    <!-- 🎵 Music -->
    <audio autoplay loop>
        <source src="https://www.bensound.com/bensound-music/bensound-sweet.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <input type="text" id="name" placeholder="Your Name 💕">

        <input type="date" id="date">
        <p class="note">Choose the date when you want to open this letter 💌</p>

        <textarea id="message" rows="6" placeholder="Pour your heart out here... 💭"></textarea>

        <button onclick="showLetter()">Save My Letter 💌</button>
        <button onclick="downloadLetter()">Download Letter 📄</button>
    </div>

    <div class="output" id="output"></div>

    <script>
        function showLetter() {
            let name = document.getElementById("name").value;
            let openDate = document.getElementById("date").value;
            let message = document.getElementById("message").value;

            let today = new Date().toISOString().split("T")[0];

            if (openDate > today) {
                document.getElementById("output").innerHTML =
                    "<h2>🔒 This letter is locked</h2>" +
                    "<p>You can open it on: " + openDate + "</p>" +
                    "<p>Be patient... your future self is waiting 💛</p>";
            } else {
                document.getElementById("output").innerHTML =
                    "<h2>Dear Future " + name + ",</h2>" +
                    "<p>" + message + "</p>" +
                    "<p><i>Opened on: " + today + "</i></p>";
            }
        }

        function downloadLetter() {
            let name = document.getElementById("name").value;
            let date = document.getElementById("date").value;
            let message = document.getElementById("message").value;

            let content = "Dear Future " + name + ",\n\n" + message + "\n\nOpen on: " + date;

            let blob = new Blob([content], { type: "text/plain" });
            let link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = "MyFutureLetter.txt";
            link.click();
        }

        // 💕 floating hearts
        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }, 500);
    </script>

</body>
</html>
